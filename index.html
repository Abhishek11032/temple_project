<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" href="/images/logo.png" />
    <link rel="preload" href="/images/logo.png" as="image" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Shri Khatu Shyam Ji Temple</title>

    <style>
      * {
      
        box-sizing: border-box;
      }

    

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #2c120d, #4a1f1f, #2c120d);
      }

      .loader-content {
        position: relative;

        width: 520px;
        height: 430px;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

        text-align: center;

        margin: auto;

        isolation: isolate;
      }

      .loader-content::before {
        content: "";
        position: absolute;
        width: 260px;
        height: 260px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border: 2px dashed rgba(255, 193, 7, 0.3);
        border-radius: 50%;
        animation: rotate 18s linear infinite;
      }

      .loader-content::after {
        content: "";
        position: absolute;
        width: 210px;
        height: 210px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border: 1px solid rgba(255, 193, 7, 0.25);
        border-radius: 50%;
        animation: rotateReverse 12s linear infinite;
      }

      .loader-logo {
        width: 170px;
        height: 170px;

        object-fit: contain;

        position: relative;
        z-index: 5;

        flex-shrink: 0;

        animation: float 2.5s ease-in-out infinite;

        filter: drop-shadow(0 0 20px rgba(255, 193, 7, 0.7));

        transform-origin: center;
      }

      .loader-title {
        margin-top: 28px;

        min-height: 58px;

        display: flex;
        align-items: center;
        justify-content: center;

        color: #ffd56a;

        font-size: 20px;
        font-weight: bold;

        letter-spacing: 1px;

        white-space: nowrap;
      }

      .loader-subtitle {
        margin-top: 18px;

        min-height: 30px;

        display: flex;
        align-items: center;
        justify-content: center;

        color: white;
        font-size: 20px;

        animation: fade 2s infinite;
      }

      .dots {
        margin-top: 28px;

        height: 14px;

        display: flex;
        justify-content: center;
        align-items: center;

        gap: 10px;
      }

      .dots span {
        width: 10px;
        height: 10px;
        background: #ffd56a;
        border-radius: 50%;
        animation: bounce 0.8s infinite;
      }

      .dots span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }

        50% {
          transform: translateY(-10px);
        }
      }

      @keyframes rotate {
        from {
          transform: translate(-50%, -50%) rotate(0);
        }

        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      @keyframes rotateReverse {
        from {
          transform: translate(-50%, -50%) rotate(360deg);
        }

        to {
          transform: translate(-50%, -50%) rotate(0);
        }
      }

      @keyframes fade {
        0%,
        100% {
          opacity: 0.4;
        }

        50% {
          opacity: 1;
        }
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-8px);
        }
      }
    </style>
  </head>

  <body>
    <!-- Initial Loader -->

    <div id="app-loader">
      <div class="loader-content">
        <img src="/images/logo.png" class="loader-logo" alt="Temple Logo" />

        <div class="loader-title">Shri Khatu Shyam Ji</div>

        <div class="loader-subtitle">🙏 जय श्री श्याम 🙏</div>

        <div class="dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
